name: Auto Tag on Push to Master

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  create-tag:
    name: "Create Auto Tag"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get Latest Tag
        id: get-tag
        run: |
          # Get the latest tag, or use v0.0.0 if no tags exist
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "📌 Latest tag: $LATEST_TAG"
      
      - name: Calculate Next Version
        id: next-version
        run: |
          LATEST_TAG="${{ steps.get-tag.outputs.latest_tag }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # Extract version numbers (remove 'v' prefix)
          VERSION=${LATEST_TAG#v}
          
          # Split into major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Increment patch version
          PATCH=$((PATCH + 1))
          
          # Create new tag
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}-${SHORT_SHA}"
          
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "📦 New tag: $NEW_TAG"
      
      - name: Create and Push Tag
        run: |
          NEW_TAG="${{ steps.next-version.outputs.new_tag }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$NEW_TAG" -m "Auto-generated tag from commit ${{ github.sha }}"
          git push origin "$NEW_TAG"
          
          echo "✅ Created and pushed tag: $NEW_TAG"
      
      - name: Summary
        run: |
          echo "### 🏷️ Tag Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ steps.next-version.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
