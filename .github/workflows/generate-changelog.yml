name: Generate Changelog

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag name"
        required: true
        type: string
      is_prerelease:
        description: "Is this a prerelease"
        required: true
        type: boolean
      tenant:
        description: "Tenant name"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: changelog-${{ github.repository }}
  cancel-in-progress: false

jobs:
  changelog:
    name: "Append Changelog"
    runs-on: ubuntu-latest
    environment: ${{ inputs.tenant }}-${{ inputs.is_prerelease && 'stage' || 'prod' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}
      
      - name: Pull Latest Changes
        run: |
          git pull origin ${{ github.event.repository.default_branch }}

      # ----------------------------------------------------------------
      # 1. Get previous deployed tag from environment variable
      # ----------------------------------------------------------------
      - name: Get Previous Deployed Tag
        id: prev
        env:
          CURRENT_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
          LATEST_DEPLOYED_TAG: ${{ vars.LATEST_DEPLOYED_TAG }}
        run: |
          echo "Looking for previous deployed tag"
          echo "- Environment variable LATEST_DEPLOYED_TAG: $LATEST_DEPLOYED_TAG"
          echo "- Current tag: $CURRENT_TAG"
          echo ""
          
          # Use environment variable for previous tag
          if [ -z "$LATEST_DEPLOYED_TAG" ] || [ "$LATEST_DEPLOYED_TAG" = "-" ]; then
            echo "No previous deployed tag found. Using current tag as previous tag (first deployment)"
            PREV_TAG="$CURRENT_TAG"
          else
            echo "Found previous deployed tag: $LATEST_DEPLOYED_TAG"
            PREV_TAG="$LATEST_DEPLOYED_TAG"
          fi
          
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # 2. Build the new changelog entry
      # ----------------------------------------------------------------
      - name: Build New Changelog Entry
        run: |
          MAX_CHANGELOG_ENTRIES=50
          CURRENT_TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          IS_PRERELEASE="${{ inputs.is_prerelease != null && inputs.is_prerelease || github.event.release.prerelease }}"
          TENANT="${{ inputs.tenant }}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"
          RELEASE_DATETIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          VERSION="$CURRENT_TAG"
          OUT="/tmp/new_entry.md"
          REPO="${{ github.repository }}"
          REPO_URL="https://github.com/${REPO}"

          if [ "$IS_PRERELEASE" = "true" ] || [ "$IS_PRERELEASE" = "True" ] || [ "$IS_PRERELEASE" = "1" ]; then
            RELEASE_TYPE="Stage"
          else
            RELEASE_TYPE="Prod"
          fi
          
          # Check if tag starts with hotfix-
          if [[ "$CURRENT_TAG" =~ ^hotfix- ]]; then
            RELEASE_TYPE="${RELEASE_TYPE}-Hotfix"
          fi

          printf '## [%s] - %s (%s) [Tenant-%s]\n\n' "$VERSION" "$RELEASE_DATETIME" "$RELEASE_TYPE" "$TENANT" > "$OUT"
          
          # Create compare link
          printf '> **Compare:** [%s...%s](%s/compare/%s...%s)\n\n' \
            "$PREV_TAG" "$CURRENT_TAG" "$REPO_URL" "$PREV_TAG" "$CURRENT_TAG" >> "$OUT"

          printf '### Commits\n\n' >> "$OUT"

          # Generate commits with hyperlinks to commit SHA
          git log "${PREV_TAG}..${CURRENT_TAG}" \
            --pretty=format:"- %s [%h]($REPO_URL/commit/%H)" \
            --no-merges >> "$OUT"

          printf '\n\n%s\n\n' '---' >> "$OUT"

          echo "Entry:"
          cat "$OUT"
          
          # Now merge the new entry into CHANGELOG.md
          CHANGELOG="CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            printf '# Changelog\n\n' > "$CHANGELOG"
            cat /tmp/new_entry.md >> "$CHANGELOG"
          else
            HEADER=$(head -2 "$CHANGELOG")
            BODY=$(tail -n +3 "$CHANGELOG")
            printf '%s\n\n' "$HEADER" > /tmp/merged.md
            cat /tmp/new_entry.md >> /tmp/merged.md
            printf '%s\n' "$BODY" >> /tmp/merged.md
            mv /tmp/merged.md "$CHANGELOG"
          fi
          
          # Keep only the latest $MAX_CHANGELOG_ENTRIES entries
          echo "Checking entry count..."
          ENTRY_COUNT=$(grep -c '^## \[' "$CHANGELOG" || true)
          echo "Found $ENTRY_COUNT entries"
          
          if [ "$ENTRY_COUNT" -gt "$MAX_CHANGELOG_ENTRIES" ]; then
            echo "  Trimming to $MAX_CHANGELOG_ENTRIES latest entries..."
            
            # Extract header (first 2 lines: "# Changelog\n\n")
            head -2 "$CHANGELOG" > /tmp/trimmed.md
            
            # Get only the first $MAX_CHANGELOG_ENTRIES entries from the body
            tail -n +3 "$CHANGELOG" | awk -v max="$MAX_CHANGELOG_ENTRIES" '
              /^## \[/ { count++ }
              count <= max { print }
            ' >> /tmp/trimmed.md
            
            mv /tmp/trimmed.md "$CHANGELOG"
            echo "Kept latest $MAX_CHANGELOG_ENTRIES entries, removed $(($ENTRY_COUNT - $MAX_CHANGELOG_ENTRIES)) old entries"
          else
            echo "No trimming needed"
          fi
          
          echo "CHANGELOG.md updated"

      # ----------------------------------------------------------------
      # 3. Commit and push
      # ----------------------------------------------------------------
      - name: Commit and Push
        run: |
          CURRENT_TAG="${{ inputs.tag_name }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes, skipping"
          else
            git commit -m "docs: update CHANGELOG.md for $CURRENT_TAG [skip ci]"
            git push origin HEAD
            echo "Pushed"
          fi
