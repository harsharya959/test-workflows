name: Trigger Tenant Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag Version (optional - uses dropdown selection if empty)"
        required: false
        type: string
      tenant:
        description: "Tenant"
        required: true
        type: choice
        options:
          - inter
          - ingka
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: write
  deployments: write
  id-token: write
  repository-projects: write

jobs:
  validate:
    name: "Validate Inputs"
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.calculate-version.outputs.tag_version }}
      release_type: ${{ steps.set-release-type.outputs.release_type }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set Release Type
        id: set-release-type
        run: |
          ENV="${{ inputs.environment }}"
          
          # Set release type based on environment
          if [[ "$ENV" == "prod" ]]; then
            RELEASE_TYPE="release"
            echo "📦 Environment is prod → Release Type: release"
          else
            RELEASE_TYPE="prerelease"
            echo "📦 Environment is stage → Release Type: prerelease"
          fi
          
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
      
      - name: Calculate Version
        id: calculate-version
        run: |
          # Priority: custom input > dropdown selection
          if [ -n "${{ inputs.version }}" ]; then
            TAG_VERSION="${{ inputs.version }}"
            echo "Using custom input version: $TAG_VERSION"
          else
            TAG_VERSION="${{ github.ref_name }}"
            echo "Using dropdown selection: $TAG_VERSION"
          fi
          
          # Check if the selected/provided ref is a tag (not a branch)
          if ! git show-ref --tags "refs/tags/$TAG_VERSION" >/dev/null 2>&1; then
            echo "❌ Error: '$TAG_VERSION' is not a valid tag"
            echo "Please provide a valid tag or select one from the dropdown"
            exit 1
          fi
          
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Tag to use: $TAG_VERSION"
      
      - name: Display Release Info
        run: |
          echo "📋 Release Information"
          echo "  - Tenant: ${{ inputs.tenant }}"
          echo "  - Environment: ${{ inputs.environment }}"
          echo "  - Tag Version: ${{ steps.calculate-version.outputs.tag_version }}"
          echo "  - Release Type: ${{ steps.set-release-type.outputs.release_type }}"

  # docker:
  #   name: "Building Docker Image: ${{ inputs.environment }}"
  #   needs: [validate]
  #   uses: ./.github/workflows/docker.yaml
  #   secrets: inherit
  #   if: ${{ needs.validate.outputs.tag_version != '' }}
  #   with:
  #     environment: ${{ inputs.environment }}
  #     tenant: ${{ inputs.tenant }}
  #     version: ${{ needs.validate.outputs.tag_version }}

  # deploy:
  #   name: "Deployment: ${{ inputs.environment }}"
  #   needs: [validate, create-release, docker]
  #   uses: ./.github/workflows/deployment.yaml
  #   secrets: inherit
  #   if: ${{ needs.validate.outputs.tag_version != '' }}
  #   with:
  #     environment: ${{ inputs.environment }}
  #     tenant: ${{ inputs.tenant }}
  #     version: ${{ needs.validate.outputs.tag_version }}

  generate-changelog-entry:
    name: "Generate Changelog Entry"
    # needs: [validate, deploy]
    needs: [validate]
    uses: ./.github/workflows/generate-changelog.yml
    with:
      tag_name: ${{ needs.validate.outputs.tag_version }}
      is_prerelease: ${{ needs.validate.outputs.release_type == 'prerelease' }}
      tenant: ${{ inputs.tenant }}
    secrets: inherit
