name: Generate Changelog

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag name"
        required: true
        type: string
      is_prerelease:
        description: "Is this a prerelease"
        required: true
        type: boolean
      tenant:
        description: "Tenant name"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: changelog-${{ github.repository }}
  cancel-in-progress: false

jobs:
  changelog:
    name: "Append Changelog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}
      
      - name: Pull Latest Changes
        run: |
          git pull origin ${{ github.event.repository.default_branch }}

      # ----------------------------------------------------------------
      # 1. Get previous tag from RELEASES.md based on tenant and environment
      # ----------------------------------------------------------------
      - name: Get Previous Tag from RELEASES.md
        id: prev
        env:
          CURRENT_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
          IS_PRERELEASE: ${{ inputs.is_prerelease != null && inputs.is_prerelease || github.event.release.prerelease }}
          TENANT: ${{ inputs.tenant }}
        run: |
          RELEASES_FILE="RELEASES.md"
          
          # Determine environment from prerelease flag
          if [ "$IS_PRERELEASE" = "true" ] || [ "$IS_PRERELEASE" = "True" ]; then
            ENVIRONMENT="stage"
          else
            ENVIRONMENT="prod"
          fi
          
          echo "🔍 Looking for previous version in RELEASES.md"
          echo "  - Tenant: $TENANT"
          echo "  - Environment: $ENVIRONMENT"
          echo "  - Current tag: $CURRENT_TAG"
          echo ""
          
          # Check if RELEASES.md exists
          if [ ! -f "$RELEASES_FILE" ]; then
            echo "❌ Error: RELEASES.md not found"
            echo "Please ensure RELEASES.md exists and has deployment history"
            exit 1
          fi
          
          # Extract version from RELEASES.md for the given tenant and environment
          PREV_TAG=$(awk -v tenant="$TENANT" -v env="$ENVIRONMENT" '
            $0 == "### " tenant { in_section = 1; next }
            in_section && /^### / { in_section = 0 }
            in_section && $0 ~ ("^\\|[[:space:]]*" env "[[:space:]]*\\|") {
              match($0, /\|[[:space:]]*[^|]+[[:space:]]*\|[[:space:]]*([^|]+)[[:space:]]*\|/, arr)
              version = arr[1]
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", version)
              if (version != "-" && version != "") {
                print version
                exit
              }
            }
          ' "$RELEASES_FILE")
          
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "-" ]; then
            echo "❌ Error: No previous version found in RELEASES.md"
            echo "Please deploy to this tenant/environment at least once before generating changelog"
            exit 1
          fi
          
          echo "✅ Found previous version: $PREV_TAG"
          
          # Validate that the previous tag exists in the repository
          if ! git show-ref --tags "refs/tags/$PREV_TAG" >/dev/null 2>&1; then
            echo "❌ Error: Previous tag '$PREV_TAG' does not exist in repository"
            echo "The RELEASES.md file contains an invalid or non-existent tag"
            exit 1
          fi
          
          echo "✅ Previous tag validated: $PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "prev_tag_display=$PREV_TAG" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # 2. Build the new changelog entry
      # ----------------------------------------------------------------
      - name: Build New Changelog Entry
        run: |
          CURRENT_TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          IS_PRERELEASE="${{ inputs.is_prerelease != null && inputs.is_prerelease || github.event.release.prerelease }}"
          TENANT="${{ inputs.tenant }}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"
          PREV_TAG_DISPLAY="${{ steps.prev.outputs.prev_tag_display }}"
          RELEASE_DATETIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          VERSION="$CURRENT_TAG"
          OUT="/tmp/new_entry.md"
          REPO="${{ github.repository }}"
          REPO_URL="https://github.com/${REPO}"

          if [ "$IS_PRERELEASE" = "true" ] || [ "$IS_PRERELEASE" = "True" ] || [ "$IS_PRERELEASE" = "1" ]; then
            RELEASE_TYPE="Stage"
          else
            RELEASE_TYPE="Prod"
          fi
          
          # Check if tag starts with hotfix-
          if [[ "$CURRENT_TAG" =~ ^hotfix- ]]; then
            RELEASE_TYPE="${RELEASE_TYPE}-Hotfix"
          fi

          printf '## [%s] - %s (%s) [Tenant-%s]\n\n' "$VERSION" "$RELEASE_DATETIME" "$RELEASE_TYPE" "$TENANT" > "$OUT"
          
          # Create compare link
          printf '> **Compare:** [%s...%s](%s/compare/%s...%s)\n\n' \
            "$PREV_TAG_DISPLAY" "$CURRENT_TAG" "$REPO_URL" "$PREV_TAG" "$CURRENT_TAG" >> "$OUT"

          printf '### Commits\n\n' >> "$OUT"

          # Generate commits with hyperlinks to commit SHA
          git log "${PREV_TAG}..${CURRENT_TAG}" \
            --pretty=format:"- %s [%h]($REPO_URL/commit/%H)" \
            --no-merges >> "$OUT"

          printf '\n\n%s\n\n' '---' >> "$OUT"

          echo "Entry:"
          cat "$OUT"

      # ----------------------------------------------------------------
      # 3. Commit and push
      # ----------------------------------------------------------------
      - name: Commit and Push
        run: |
          CURRENT_TAG="${{ inputs.tag_name || github.event.release.tag_name }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git fetch origin "$DEFAULT_BRANCH"

          git checkout -- . 2>/dev/null || true
          git clean -fd    2>/dev/null || true

          git checkout "$DEFAULT_BRANCH"
          git pull --rebase origin "$DEFAULT_BRANCH"

          # Now merge our new entry into the latest CHANGELOG.md
          CHANGELOG="CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            printf '# Changelog\n\n' > "$CHANGELOG"
            cat /tmp/new_entry.md >> "$CHANGELOG"
          else
            HEADER=$(head -2 "$CHANGELOG")
            BODY=$(tail -n +3 "$CHANGELOG")
            printf '%s\n\n' "$HEADER" > /tmp/merged.md
            cat /tmp/new_entry.md >> /tmp/merged.md
            printf '%s\n' "$BODY" >> /tmp/merged.md
            mv /tmp/merged.md "$CHANGELOG"
          fi

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes, skipping"
          else
            git commit -m "docs: update CHANGELOG.md for $CURRENT_TAG [skip ci]"
            git push origin "$DEFAULT_BRANCH"
            echo "Pushed"
          fi
