name: Generate Changelog on Release

on:
  release:
    types: [published, prereleased]

permissions:
  contents: write

env:
  # Space-separated list of tenants - same as your deploy matrix
  TENANT_LIST: "tenant-a tenant-b tenant-c"

jobs:
  generate-changelog:
    name: "Generate Changelog"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 1. Basic release metadata
      # ----------------------------------------------------------------
      - name: Get Release Info
        id: release-info
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_DATE=$(date -u +"%Y-%m-%d")

          RELEASE_TYPE="Release"
          if [ "$IS_PRERELEASE" == "true" ]; then
            RELEASE_TYPE="Pre-Release"
          fi

          echo "release_tag=$RELEASE_TAG"     >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME"   >> $GITHUB_OUTPUT
          echo "release_date=$RELEASE_DATE"   >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE"   >> $GITHUB_OUTPUT

          echo "Release Tag  : $RELEASE_TAG"
          echo "Release Type : $RELEASE_TYPE"
          echo "Release Date : $RELEASE_DATE"

      # ----------------------------------------------------------------
      # 2. Find the previous tag
      # ----------------------------------------------------------------
      - name: Get Previous Tag
        id: prev-tag
        run: |
          CURRENT_TAG="${{ steps.release-info.outputs.release_tag }}"

          PREFIX=""
          if [[ "$CURRENT_TAG" =~ ^([a-z]+)-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PREFIX="${BASH_REMATCH[1]}-"
          fi

          ALL_TAGS=$(git tag -l | grep -E "^${PREFIX}v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V)

          PREV_TAG=""
          for TAG in $ALL_TAGS; do
            [ "$TAG" == "$CURRENT_TAG" ] && break
            PREV_TAG="$TAG"
          done

          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "prev_tag=$PREV_TAG"              >> $GITHUB_OUTPUT
            echo "prev_tag_display=Initial Commit" >> $GITHUB_OUTPUT
          else
            echo "prev_tag=$PREV_TAG"              >> $GITHUB_OUTPUT
            echo "prev_tag_display=$PREV_TAG"      >> $GITHUB_OUTPUT
          fi

          echo "Previous tag: ${PREV_TAG}"

      # ----------------------------------------------------------------
      # 3. Build CHANGELOG.md entry using printf (no heredoc)
      # ----------------------------------------------------------------
      - name: Build Changelog Entry
        run: |
          CURRENT_TAG="${{ steps.release-info.outputs.release_tag }}"
          PREV_TAG="${{ steps.prev-tag.outputs.prev_tag }}"
          PREV_TAG_DISPLAY="${{ steps.prev-tag.outputs.prev_tag_display }}"
          RELEASE_DATE="${{ steps.release-info.outputs.release_date }}"
          RELEASE_TYPE="${{ steps.release-info.outputs.release_type }}"
          REPO="${{ github.repository }}"
          RELEASE_NAME="${{ steps.release-info.outputs.release_name }}"
          OUT="/tmp/new_entry.md"

          # Header
          printf '---\n\n' > "$OUT"
          printf '## %s: [%s](https://github.com/%s/releases/tag/%s) | %s\n\n' \
            "$RELEASE_TYPE" "$CURRENT_TAG" "$REPO" "$CURRENT_TAG" "$RELEASE_DATE" >> "$OUT"
          printf '> **Release Name:** %s\n' "$RELEASE_NAME" >> "$OUT"
          printf '> **Compare:** [%s to %s](https://github.com/%s/compare/%s...%s)\n\n' \
            "$PREV_TAG_DISPLAY" "$CURRENT_TAG" "$REPO" "$PREV_TAG" "$CURRENT_TAG" >> "$OUT"

          # Tenant table
          printf '### Tenant Deployment Status\n\n' >> "$OUT"
          printf '| Tenant | Deployed Tag |\n' >> "$OUT"
          printf '|--------|--------------|\n' >> "$OUT"

          for TENANT in $TENANT_LIST; do
            TENANT_TAG=$(git tag -l | grep -E "^${TENANT}-v[0-9]+\.[0-9]+\.[0-9]+$" | sort -V | tail -n1)
            if [ -z "$TENANT_TAG" ]; then
              TENANT_TAG="${CURRENT_TAG} (global)"
            fi
            printf '| `%s` | `%s` |\n' "$TENANT" "$TENANT_TAG" >> "$OUT"
          done

          printf '\n' >> "$OUT"

          # Commits table
          printf '### Commits\n\n' >> "$OUT"
          printf '| SHA | Message | Author |\n' >> "$OUT"
          printf '|-----|---------|--------|\n' >> "$OUT"

          COMMITS=$(git log "${PREV_TAG}..${CURRENT_TAG}" \
            --pretty=format:"| [%h](https://github.com/${REPO}/commit/%H) | %s | @%an |" \
            --no-merges)

          if [ -z "$COMMITS" ]; then
            printf '| - | _No new commits_ | - |\n' >> "$OUT"
          else
            printf '%s\n' "$COMMITS" >> "$OUT"
          fi

          printf '\n' >> "$OUT"

          echo "Changelog entry written:"
          cat "$OUT"

      # ----------------------------------------------------------------
      # 4. Prepend entry into CHANGELOG.md (create if missing)
      # ----------------------------------------------------------------
      - name: Update CHANGELOG.md
        run: |
          CHANGELOG="CHANGELOG.md"

          if [ ! -f "$CHANGELOG" ]; then
            printf '# Changelog\n\nAll releases are automatically tracked here.\n\n' > "$CHANGELOG"
            echo "Created new CHANGELOG.md"
          fi

          if grep -q '^---$' "$CHANGELOG"; then
            HEADER=$(awk '/^---$/{exit} {print}' "$CHANGELOG")
            REST=$(awk 'found{print} /^---$/{found=1}' "$CHANGELOG")
            printf '%s\n' "$HEADER" > /tmp/changelog_new.md
            cat /tmp/new_entry.md   >> /tmp/changelog_new.md
            printf '\n%s\n' "$REST" >> /tmp/changelog_new.md
          else
            cat "$CHANGELOG" /tmp/new_entry.md > /tmp/changelog_new.md
          fi

          mv /tmp/changelog_new.md "$CHANGELOG"
          echo "CHANGELOG.md updated"

      # ----------------------------------------------------------------
      # 5. Commit and push CHANGELOG.md
      # ----------------------------------------------------------------
      - name: Commit and Push CHANGELOG.md
        run: |
          CURRENT_TAG="${{ steps.release-info.outputs.release_tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes to CHANGELOG.md, skipping commit"
          else
            git commit -m "docs: update CHANGELOG.md for $CURRENT_TAG [skip ci]"
            git push origin "$DEFAULT_BRANCH"
            echo "CHANGELOG.md pushed to $DEFAULT_BRANCH"
          fi

      # ----------------------------------------------------------------
      # 6. Job summary
      # ----------------------------------------------------------------
      - name: Summary
        run: |
          CURRENT_TAG="${{ steps.release-info.outputs.release_tag }}"
          RELEASE_TYPE="${{ steps.release-info.outputs.release_type }}"
          PREV_TAG_DISPLAY="${{ steps.prev-tag.outputs.prev_tag_display }}"

          echo "### Changelog Generation Result"           >> $GITHUB_STEP_SUMMARY
          echo ""                                          >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |"                         >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"                         >> $GITHUB_STEP_SUMMARY
          echo "| **Type**     | $RELEASE_TYPE |"          >> $GITHUB_STEP_SUMMARY
          echo "| **Tag**      | \`$CURRENT_TAG\` |"       >> $GITHUB_STEP_SUMMARY
          echo "| **Previous** | \`$PREV_TAG_DISPLAY\` |" >> $GITHUB_STEP_SUMMARY
          echo ""                                          >> $GITHUB_STEP_SUMMARY
          echo "CHANGELOG.md updated and pushed"           >> $GITHUB_STEP_SUMMARY
