name: Generate Changelog

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag name"
        required: true
        type: string
      is_prerelease:
        description: "Is this a prerelease"
        required: true
        type: boolean
      tenant:
        description: "Tenant name"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: changelog-${{ github.repository }}
  cancel-in-progress: false

jobs:
  changelog:
    name: "Append Changelog Entry"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 1. Find the previous tag of the SAME release type via GitHub API
      # ----------------------------------------------------------------
      - name: Get Previous Tag (same release type)
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
          IS_PRERELEASE: ${{ inputs.is_prerelease != null && inputs.is_prerelease || github.event.release.prerelease }}
        run: |
          PAGE=1
          PREV_TAG=""
          
          echo "🔍 Searching for previous tag of same type..."
          echo "Current tag: $CURRENT_TAG"
          echo "Is prerelease: $IS_PRERELEASE"
          echo ""

          while true; do
            echo "📄 Fetching page $PAGE..."
            # Fetch up to 50 releases per page
            RELEASES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/releases?per_page=50&page=${PAGE}")

            # No more pages
            COUNT=$(echo "$RELEASES" | jq 'length')
            echo "   Found $COUNT releases on this page"
            
            if [ "$COUNT" -eq 0 ]; then
              echo "   No more pages to fetch"
              break
            fi

            # Find the most recent release (other than current) that matches type
            MATCH=$(echo "$RELEASES" | jq -r \
              --arg current "$CURRENT_TAG" \
              --argjson isprerelease "$IS_PRERELEASE" \
              '[.[] | select(.tag_name != $current and .prerelease == $isprerelease and .draft == false)]
               | sort_by(.created_at) | reverse | .[0].tag_name // ""')

            echo "   Match result: '$MATCH'"

            if [ -n "$MATCH" ] && [ "$MATCH" != "null" ]; then
              PREV_TAG="$MATCH"
              echo "   ✅ Found matching previous tag: $PREV_TAG"
              break
            fi

            echo "   ⏭️  No match on this page, checking next page..."
            PAGE=$((PAGE + 1))
          done
          
          echo ""

          if [ -z "$PREV_TAG" ]; then
            # No previous release of same type - fall back to first commit
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
            echo "prev_tag=$PREV_TAG"              >> $GITHUB_OUTPUT
            echo "prev_tag_display=Initial Commit" >> $GITHUB_OUTPUT
          else
            echo "prev_tag=$PREV_TAG"              >> $GITHUB_OUTPUT
            echo "prev_tag_display=$PREV_TAG"      >> $GITHUB_OUTPUT
          fi

          echo "Previous tag (same type): $PREV_TAG"

      # ----------------------------------------------------------------
      # 2. Build the new changelog entry
      # ----------------------------------------------------------------
      - name: Build New Changelog Entry
        run: |
          CURRENT_TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          IS_PRERELEASE="${{ inputs.is_prerelease != null && inputs.is_prerelease || github.event.release.prerelease }}"
          TENANT="${{ inputs.tenant }}"
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"
          PREV_TAG_DISPLAY="${{ steps.prev.outputs.prev_tag_display }}"
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          VERSION="$CURRENT_TAG"
          OUT="/tmp/new_entry.md"
          REPO="${{ github.repository }}"
          REPO_URL="https://github.com/${REPO}"

          if [ "$IS_PRERELEASE" = "true" ] || [ "$IS_PRERELEASE" = "True" ] || [ "$IS_PRERELEASE" = "1" ]; then
            RELEASE_TYPE="Stage"
          else
            RELEASE_TYPE="Prod"
          fi
          
          # Check if tag starts with hotfix-
          if [[ "$CURRENT_TAG" =~ ^hotfix- ]]; then
            RELEASE_TYPE="${RELEASE_TYPE}-Hotfix"
          fi

          printf '## [%s] - %s (%s) [Tenant-%s]\n\n' "$VERSION" "$RELEASE_DATE" "$RELEASE_TYPE" "$TENANT" > "$OUT"
          
          # Create compare link
          printf '> **Compare:** [%s...%s](%s/compare/%s...%s)\n\n' \
            "$PREV_TAG_DISPLAY" "$CURRENT_TAG" "$REPO_URL" "$PREV_TAG" "$CURRENT_TAG" >> "$OUT"

          printf '### Commits\n\n' >> "$OUT"

          # Generate commits with hyperlinks to commit SHA
          git log "${PREV_TAG}..${CURRENT_TAG}" \
            --pretty=format:"- %s [%h]($REPO_URL/commit/%H)" \
            --no-merges >> "$OUT"

          printf '\n\n%s\n\n' '---' >> "$OUT"

          echo "Entry:"
          cat "$OUT"

      # ----------------------------------------------------------------
      # 3. Commit and push
      # ----------------------------------------------------------------
      - name: Commit and Push
        run: |
          CURRENT_TAG="${{ inputs.tag_name || github.event.release.tag_name }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git fetch origin "$DEFAULT_BRANCH"

          git checkout -- . 2>/dev/null || true
          git clean -fd    2>/dev/null || true

          git checkout "$DEFAULT_BRANCH"
          git pull --rebase origin "$DEFAULT_BRANCH"

          # Now merge our new entry into the latest CHANGELOG.md
          CHANGELOG="CHANGELOG.md"
          if [ ! -f "$CHANGELOG" ]; then
            printf '# Changelog\n\n' > "$CHANGELOG"
            cat /tmp/new_entry.md >> "$CHANGELOG"
          else
            HEADER=$(head -2 "$CHANGELOG")
            BODY=$(tail -n +3 "$CHANGELOG")
            printf '%s\n\n' "$HEADER" > /tmp/merged.md
            cat /tmp/new_entry.md >> /tmp/merged.md
            printf '%s\n' "$BODY" >> /tmp/merged.md
            mv /tmp/merged.md "$CHANGELOG"
          fi

          git add CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes, skipping"
          else
            git commit -m "docs: update CHANGELOG.md for $CURRENT_TAG [skip ci]"
            git push origin "$DEFAULT_BRANCH"
            echo "Pushed"
          fi
