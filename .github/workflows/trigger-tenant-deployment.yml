name: Trigger Tenant Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag Version"
        required: false
        type: string
      tenant:
        description: "Tenant"
        required: true
        type: choice
        options:
          - inter
          - ingka
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: write
  deployments: write
  id-token: write
  repository-projects: write

jobs:
  validate-tag:
    name: "Validate Tag"
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.calculate-version.outputs.tag_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Calculate Version
        id: calculate-version
        run: |
          # Check if version is provided
          if [ -z "${{ inputs.version }}" ]; then
            echo "Error: Version is required. Please provide a tag version"
            exit 1
          fi
          
          TAG_VERSION="${{ inputs.version }}"
          echo "Using provided version: $TAG_VERSION"
          
          # Check if the provided version is a valid tag
          if ! git show-ref --tags "refs/tags/$TAG_VERSION" >/dev/null 2>&1; then
            echo "Error: '$TAG_VERSION' is not a valid tag. Please provide a valid tag that exists in the repository"
            exit 1
          fi
          
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag to use: $TAG_VERSION"
      
      - name: Display Release Info
        run: |
          ENV="${{ inputs.environment }}"
          if [[ "$ENV" == "prod" ]]; then
            RELEASE_TYPE="release"
          else
            RELEASE_TYPE="prerelease"
          fi
          
          echo "Release Information"
          echo "- Tenant: ${{ inputs.tenant }}"
          echo "- Environment: ${{ inputs.environment }}"
          echo "- Tag Version: ${{ steps.calculate-version.outputs.tag_version }}"
          echo "- Release Type: $RELEASE_TYPE"

  # docker:
  #   name: "Building Docker Image: ${{ inputs.environment }}"
  #   needs: [validate-tag]
  #   uses: ./.github/workflows/docker.yaml
  #   secrets: inherit
  #   if: ${{ needs.validate-tag.outputs.tag_version != '' }}
  #   with:
  #     environment: ${{ inputs.environment }}
  #     tenant: ${{ inputs.tenant }}
  #     version: ${{ needs.validate-tag.outputs.tag_version }}

  # deploy:
  #   name: "Deployment: ${{ inputs.environment }}"
  #   needs: [validate-tag, create-release, docker]
  #   uses: ./.github/workflows/deployment.yaml
  #   secrets: inherit
  #   if: ${{ needs.validate-tag.outputs.tag_version != '' }}
  #   with:
  #     environment: ${{ inputs.environment }}
  #     tenant: ${{ inputs.tenant }}
  #     version: ${{ needs.validate-tag.outputs.tag_version }}

  generate-changelog-entry:
    name: "Generate Changelog Entry"
    # needs: [validate-tag, deploy]
    needs: [validate-tag]
    uses: ./.github/workflows/generate-changelog-v2.yml
    with:
      tag_version: ${{ needs.validate-tag.outputs.tag_version }}
      tenant: ${{ inputs.tenant }}
      environment: ${{ inputs.environment }}
    secrets: inherit

  update-releases-table:
    name: Update Releases Table
    # needs: [validate-tag, docker, deploy]
    needs: [validate-tag, generate-changelog-entry]
    if: ${{ needs.validate-tag.outputs.tag_version != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      - name: Update release notes
        run: make deploy DEPLOYED_BY=${{ github.actor }} ENV=${{ inputs.environment }} TENANT=${{ inputs.tenant }} TAG=${{ needs.validate-tag.outputs.tag_version }}
