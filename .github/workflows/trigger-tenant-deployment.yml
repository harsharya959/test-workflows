name: Trigger Tenant Deployment

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Tag Version"
        required: false
        type: string
      tenant:
        description: "Tenant"
        required: true
        type: choice
        options:
          - inter
          - ingka
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: write
  deployments: write
  id-token: write
  repository-projects: write

jobs:
  validate-tag:
    name: "Validate Tag"
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.calculate-version.outputs.tag_version }}
      release_type: ${{ steps.set-release-type.outputs.release_type }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set Release Type
        id: set-release-type
        run: |
          ENV="${{ inputs.environment }}"
          
          # Set release type based on environment
          if [[ "$ENV" == "prod" ]]; then
            RELEASE_TYPE="release"
            echo "📦 Environment is prod → Release Type: release"
          else
            RELEASE_TYPE="prerelease"
            echo "📦 Environment is stage → Release Type: prerelease"
          fi
          
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
      
      - name: Calculate Version
        id: calculate-version
        run: |
          # Check if version is provided
          if [ -z "${{ inputs.version }}" ]; then
            echo "❌ Error: Version is required"
            echo "Please provide a tag version"
            exit 1
          fi
          
          TAG_VERSION="${{ inputs.version }}"
          echo "Using provided version: $TAG_VERSION"
          
          # Check if the provided version is a valid tag
          if ! git show-ref --tags "refs/tags/$TAG_VERSION" >/dev/null 2>&1; then
            echo "❌ Error: '$TAG_VERSION' is not a valid tag"
            echo "Please provide a valid tag that exists in the repository"
            exit 1
          fi
          
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Tag to use: $TAG_VERSION"
      
      - name: Display Release Info
        run: |
          echo "📋 Release Information"
          echo "  - Tenant: ${{ inputs.tenant }}"
          echo "  - Environment: ${{ inputs.environment }}"
          echo "  - Tag Version: ${{ steps.calculate-version.outputs.tag_version }}"
          echo "  - Release Type: ${{ steps.set-release-type.outputs.release_type }}"

  # docker:
  #   name: "Building Docker Image: ${{ inputs.environment }}"
  #   needs: [validate-tag]
  #   uses: ./.github/workflows/docker.yaml
  #   secrets: inherit
  #   if: ${{ needs.validate-tag.outputs.tag_version != '' }}
  #   with:
  #     environment: ${{ inputs.environment }}
  #     tenant: ${{ inputs.tenant }}
  #     version: ${{ needs.validate-tag.outputs.tag_version }}

  # deploy:
  #   name: "Deployment: ${{ inputs.environment }}"
  #   needs: [validate-tag, create-release, docker]
  #   uses: ./.github/workflows/deployment.yaml
  #   secrets: inherit
  #   if: ${{ needs.validate-tag.outputs.tag_version != '' }}
  #   with:
  #     environment: ${{ inputs.environment }}
  #     tenant: ${{ inputs.tenant }}
  #     version: ${{ needs.validate-tag.outputs.tag_version }}

  update-releases-table:
    name: Update Releases Table
    # needs: [validate-tag, docker, deploy]
    needs: [validate-tag]
    if: ${{ needs.validate-tag.outputs.tag_version != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      - name: Update release notes
        run: make deploy DEPLOYED_BY=${{ github.actor }} ENV=${{ inputs.environment }} TENANT=${{ inputs.tenant }} TAG=${{ needs.validate-tag.outputs.tag_version }}

  generate-changelog-entry:
    name: "Generate Changelog Entry"
    # needs: [validate-tag, deploy]
    needs: [validate-tag, update-releases-table]
    uses: ./.github/workflows/generate-changelog.yml
    with:
      tag_name: ${{ needs.validate-tag.outputs.tag_version }}
      is_prerelease: ${{ needs.validate-tag.outputs.release_type == 'prerelease' }}
      tenant: ${{ inputs.tenant }}
    secrets: inherit
